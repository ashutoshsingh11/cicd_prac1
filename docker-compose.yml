services:
  app:
    image: ghcr.io/ashutoshsingh11/hello-docker-backend:latest
    pull_policy: always
    container_name: hello-docker-backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s