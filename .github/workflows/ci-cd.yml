name: CI/CD — Build & Deploy to EC2

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  IMAGE_NAME: hello-docker-backend
  REGISTRY: ghcr.io

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1 ── Test
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm install --omit=dev

      - name: Run tests
        run: npm test

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2 ── Build & Push to GHCR (GitHub Container Registry)
  # Auth: GITHUB_TOKEN — auto-injected, no secrets needed
  # ─────────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write   # allows push to ghcr.io

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Authenticate using the auto-provided GITHUB_TOKEN — no secrets to configure
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 3 ── Smoke Test the pushed image
  # ─────────────────────────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke Test Container
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push'

    permissions:
      packages: read

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and run container
        run: |
          docker run -d \
            --name smoke \
            -p 3000:3000 \
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest

      - name: Wait for container to be healthy
        run: |
          for i in $(seq 1 15); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' smoke 2>/dev/null || echo "starting")
            echo "Health status: $STATUS"
            [ "$STATUS" = "healthy" ] && break
            sleep 2
          done

      - name: Hit the endpoint
        run: |
          RESPONSE=$(curl -sf http://localhost:3000)
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | grep -q "Hello from Docker" \
            && echo "✅ Smoke test passed!" \
            || (echo "❌ Smoke test FAILED"; exit 1)

      - name: Cleanup container
        if: always()
        run: docker rm -f smoke || true

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 4 ── Deploy to EC2 via SSH
  # Secrets needed (repo Settings → Secrets → Actions):
  #   EC2_HOST       → your EC2 public IP
  #   EC2_USER       → ubuntu  (or ec2-user for Amazon Linux)
  #   EC2_SSH_KEY    → full contents of your .pem file
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: smoke-test
    if: github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Pull latest code
            cd ~/cicd_prac1
            git pull origin main

            # Log in to GHCR on the EC2 instance using a scoped token
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull the latest image and restart
            sudo docker compose pull
            sudo docker compose down
            sudo docker compose up -d

            echo "✅ Deployed successfully on EC2"