name: CI/CD — Build & Deploy to EC2

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  IMAGE_NAME: hello-docker-backend
  REGISTRY: ghcr.io

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1 ── Test
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm install --omit=dev

      - name: Run tests
        run: npm test

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2 ── Build & Push to GHCR
  # ─────────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 3 ── Smoke Test
  # ─────────────────────────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke Test Container
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push'

    permissions:
      packages: read

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and run container
        run: |
          docker run -d \
            --name smoke \
            -p 3000:3000 \
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest

      - name: Wait for container to be healthy
        run: |
          for i in $(seq 1 15); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' smoke 2>/dev/null || echo "starting")
            echo "Health status: $STATUS"
            [ "$STATUS" = "healthy" ] && break
            sleep 2
          done

      - name: Hit the endpoint
        run: |
          RESPONSE=$(curl -sf http://localhost:3000)
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | grep -q "Hello from Docker" \
            && echo "✅ Smoke test passed!" \
            || (echo "❌ Smoke test FAILED"; exit 1)

      - name: Cleanup container
        if: always()
        run: docker rm -f smoke || true

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 4 ── Deploy to EC2
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: smoke-test
    if: github.event_name == 'push'

    steps:
      # ── Debug: verify secrets have no hidden chars ──────────────────────
      - name: Debug EC2 host secret
        run: |
          echo "Host length: ${#HOST}"
          echo "Host value: '${HOST}'"
          echo "User value: '${USER}'"
          echo "Key length: ${#KEY}"
          echo "Key first line: $(echo "$KEY" | head -1)"
          echo "Key line count: $(echo "$KEY" | wc -l)"
        env:
          HOST: ${{ secrets.EC2_HOST }}
          USER: ${{ secrets.EC2_USER }}
          KEY: ${{ secrets.EC2_SSH_KEY }}

      # ── Debug: test TCP reachability on port 22 ─────────────────────────
      - name: Test port 22 reachability
        run: |
          nc -zv ${{ secrets.EC2_HOST }} 22 && echo "✅ Port 22 reachable" || echo "❌ Port 22 NOT reachable"

      # ── Deploy via SSH ───────────────────────────────────────────────────
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 10m
          debug: true
          script: |
            cd ~/cicd_prac1
            git pull origin main
            sudo docker compose pull
            sudo docker compose down
            sudo docker compose up -d
            echo "✅ Deployed successfully on EC2"
