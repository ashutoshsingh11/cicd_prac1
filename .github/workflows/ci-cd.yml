name: CI/CD — Build & Push Docker Image

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  IMAGE_NAME: hello-docker-backend

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1 ── Test
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Run tests
        run: npm test

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2 ── Build & Push (only on push to main/master, not on PRs)
  # ─────────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write   # needed for GHCR

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Docker Buildx (multi-platform builds + cache) ─────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Login to GitHub Container Registry ───────────────────────────────
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── (Optional) Also log in to Docker Hub ─────────────────────────────
      # Uncomment below and add DOCKERHUB_USERNAME / DOCKERHUB_TOKEN secrets
      # if you want to push to Docker Hub as well.
      #
      # - name: Log in to Docker Hub
      #   uses: docker/login-action@v3
      #   with:
      #     username: ${{ secrets.DOCKERHUB_USERNAME }}
      #     password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Build metadata (tags + labels) ───────────────────────────────────
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch

      # ── Build and push ────────────────────────────────────────────────────
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Print image digest for traceability ──────────────────────────────
      - name: Image digest
        run: echo "Pushed image digest → ${{ steps.build-and-push.outputs.digest }}"

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 3 ── Smoke-test the pushed image
  # ─────────────────────────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke Test Container
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push'

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and run container
        run: |
          docker run -d \
            --name smoke \
            -p 3000:3000 \
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest

      - name: Wait for container to be healthy
        run: |
          for i in $(seq 1 15); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' smoke 2>/dev/null || echo "starting")
            echo "Health status: $STATUS"
            [ "$STATUS" = "healthy" ] && break
            sleep 2
          done

      - name: Hit the endpoint
        run: |
          RESPONSE=$(curl -sf http://localhost:3000)
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | grep -q "Hello from Docker" \
            && echo "✅ Smoke test passed!" \
            || (echo "❌ Smoke test FAILED"; exit 1)

      - name: Cleanup container
        if: always()
        run: docker rm -f smoke || true
